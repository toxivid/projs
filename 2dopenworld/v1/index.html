<!DOCTYPE html>
<html lang="en">
<head>
    <title>2d game</title>
    <style>
    </style>
</head>
<body>
    <canvas id="canvas" width="1100" height="600"></canvas>
    <p id="coordinates">coordinates: x = 0, y = 0</p>
    
    <script>
        const canvas = document.getElementById("canvas")
        const ctx = canvas.getContext("2d")

        let player = {
            size: {
                width: 20,
                height: 20,
            }
        }
        
        let camera = {
            coordinates: {
                x: 0,
                y: 0,
            },
            speed: 5,
        }
        
        class create_tree {
            constructor() {
                this.x = Math.random() * 10000
                this.y = Math.random() * 10000
            }
        }
        
        let all_trees = {}

        document.addEventListener("keydown", function(event) {
            if (event.key === "w") {
                camera.coordinates.y -= camera.speed
            }
            if (event.key === "s") {
                camera.coordinates.y += camera.speed
            }
            if (event.key === "a") {
                camera.coordinates.x -= camera.speed
            }
            if (event.key === "d") {
                camera.coordinates.x += camera.speed
            }
        })

        for (let i = 0; i < 1000; i++) {
            all_trees["tree" + i] = new create_tree()
        }
        
        function game_loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height)

            // draw background
            ctx.fillStyle = "aqua"
            ctx.fillRect(0, 0, canvas.width, canvas.height)
            
            // draw player
            ctx.fillStyle = "red"
            ctx.fillRect((canvas.width / 2) - player.size.width / 2, (canvas.height / 2) - player.size.height / 2, player.size.width, player.size.height)

            // get trees unfinished
            for (let i = 0; i < Object.keys(all_trees).length; i++) {
                let tree_x = all_trees[Object.keys(all_trees)[i]].x
                let tree_y = all_trees[Object.keys(all_trees)[i]].y

                if (((camera.coordinates.x - tree_x) >= 0 - canvas.width / 2) && ((camera.coordinates.x - tree_x) <= 0 + canvas.width / 2) && ((camera.coordinates.y - tree_y) >= 0 - canvas.height / 2) && ((camera.coordinates.y - tree_y) <= 0 + canvas.height / 2)) {
                    ctx.fillStyle = "green"
                    ctx.fillRect(tree_x - camera.coordinates.x + canvas.width / 2, tree_y - camera.coordinates.y + canvas.height / 2, 50, 50)
                }
                
            }

            // update p
            document.getElementById("coordinates").textContent = `coordinates: x=${camera.coordinates.x}, y=${camera.coordinates.y}`

            requestAnimationFrame(game_loop)
        }

        game_loop()
    </script>
</body>
